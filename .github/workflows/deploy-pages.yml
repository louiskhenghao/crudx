name: Deploy example to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Don't cancel the in-flight one — let
# it finish so the live site is never left in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build + export Next.js static site
        run: yarn nx run example:export
        env:
          NEXT_PUBLIC_BASE_PATH: /crudx

      # GitHub Pages runs Jekyll by default which strips files starting
      # with `_` — that nukes Next.js's `_next/` asset directory.
      - name: Disable Jekyll
        run: touch dist/apps/example/exported/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/example/exported

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
